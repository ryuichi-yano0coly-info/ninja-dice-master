    .char-atk-badge { font-size:10.5px; font-weight:800; color:#fde68a; margin-top:1px; }

    /* 仲間画面：レベルアップ */
    .char-lv-block { width:100%; margin-top:2px; display:flex; flex-direction:column; align-items:center; gap:3px; }
    .char-lv-badge { font-size:10.5px; font-weight:900; color:#fde68a; background:rgba(0,0,0,.4); padding:2px 8px; border-radius:999px; }
    .char-lvup-btn { width:100%; padding:6px 4px; border-radius:9px; border:none; cursor:pointer; font-size:11px; font-weight:900; color:#0b0f19; background:linear-gradient(180deg,#fde68a,#F0C040); }
    .char-lvup-btn.disabled, .char-lvup-btn:disabled { filter:grayscale(.6) brightness(.75); cursor:default; }
    .char-lvup-btn.max { background:rgba(255,255,255,.12); color:#9ca3af; }

    /* season — 花見シーズン */
    /* 背景画像は上部（お祭りの空・提灯）を見せ、UIは下部パネルへ */
    .season-screen { justify-content:flex-end; }
    .season-title { margin-top:2px; filter: drop-shadow(0 3px 8px rgba(0,0,0,.55)); }
    .season-title .scroll-banner { width:320px; height:112px; }
    /* ヘディングを大きく／目立たせる */
    .season-title.scroll-banner, .scroll-banner.season-title { width:322px; height:112px; margin:2px auto 6px; }
    .season-title .scroll-title { font-size:34px; letter-spacing:2px; }
    .season-title .scroll-sub { font-size:12px; letter-spacing:2px; }

    /* 下部パネル：画面下 ~62% を占め、上へ向かって透過するスクリム */
    .season-body {
      position:relative; z-index:5; flex:0 0 auto; height:62%;
      display:flex; flex-direction:column; min-height:0;
      padding:12px 12px 0;
      background:linear-gradient(180deg, rgba(15,23,42,0) 0%, rgba(15,23,42,.55) 14%, rgba(15,23,42,.86) 34%, rgba(15,23,42,.94) 100%);
      border-top:2px solid rgba(240,192,64,.35);
      border-radius:22px 22px 0 0;
      box-shadow:0 -8px 24px rgba(0,0,0,.4);
    }

    /* シーズンXPプログレスバー */
    .season-xpbar { flex:0 0 auto; background:rgba(0,0,0,.35); border:1.5px solid rgba(240,192,64,.4); border-radius:14px; padding:9px 12px 10px; margin-bottom:10px; }
    .season-xpbar .sx-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:6px; }
    .season-xpbar .sx-label { font-size:12px; font-weight:800; color:#fbcfe8; letter-spacing:1px; }
    .season-xpbar .sx-val { font-size:20px; font-weight:900; color:#F0C040; text-shadow:0 1px 2px rgba(0,0,0,.6); }
    .season-xpbar .sx-track { height:12px; border-radius:999px; background:rgba(0,0,0,.5); border:1.5px solid rgba(255,255,255,.18); overflow:hidden; }
    .season-xpbar .sx-fill { height:100%; border-radius:999px; background:linear-gradient(90deg,#f472b6,#ec4899,#F0C040); box-shadow:0 0 8px rgba(236,72,153,.7); transition:width .4s ease; }
    .season-xpbar .sx-next { margin-top:5px; text-align:right; font-size:11px; font-weight:700; color:#e5e7eb; }

    .season-body .sheet-scroll { padding:0 0 20px; }
    .season-track { display:flex; flex-direction:column; gap:8px; }
    .season-tier { display:grid; grid-template-columns:48px 1fr 56px 60px; align-items:center; gap:8px; background:rgba(17,24,39,.62); border:1.5px solid #334155; border-radius:14px; padding:9px 10px; opacity:.7; transition:border-color .2s, opacity .2s; }
    .season-tier.on { opacity:1; border-color:#f472b6; background:linear-gradient(180deg, rgba(236,72,153,.16), rgba(17,24,39,.72)); box-shadow:0 0 0 1px rgba(244,114,182,.35) inset; }
    .season-tier.claimed { opacity:.85; border-color:rgba(52,211,153,.55); background:rgba(6,78,59,.35); }
    .st-tier { font-weight:900; color:#F0C040; font-size:14px; } .st-reward { font-weight:800; color:#fff; } .st-req { font-size:11px; color:#cbd5e1; text-align:right; }
    .season-tier.locked .st-req { color:#9ca3af; }
    .tier-btn { padding:7px 4px; border-radius:8px; border:none; background:#334155; color:#9ca3af; font-weight:800; font-size:12px; cursor:pointer; }
    .tier-btn .tb-lock { width:14px; height:14px; object-fit:contain; vertical-align:-2px; filter:grayscale(1); opacity:.85; }
    .tier-btn.ready { background:linear-gradient(180deg,#34d399,#059669); color:#fff; }
    .season-tier.claimed .tier-btn { background:rgba(52,211,153,.25); color:#6ee7b7; }

    /* invite */
    .invite-hero { position:relative; z-index:6; text-align:center; padding:10px 14px; }
    .invite-code { color:#e5e7eb; font-size:14px; margin-bottom:8px; } .invite-code b{ color:#F0C040; letter-spacing:1px; }
    .invite-note { font-size:11px; color:#9ca3af; margin-top:6px; }
    .invite-mile { display:grid; grid-template-columns:28px 1fr 90px 56px; align-items:center; gap:6px; background:rgba(17,24,39,.6); border:1.5px solid #334155; border-radius:12px; padding:9px 10px; margin-bottom:8px; }
    .invite-mile.reached { border-color:#059669; }
    .im-label { font-size:12px; font-weight:700; color:#fff; } .im-reward { font-size:12px; font-weight:800; color:#F0C040; text-align:right; }

    /* settings */
    .settings-sec { background:rgba(0,0,0,.4); border:1.5px solid rgba(240,192,64,.4);
      border-radius:14px; padding:12px 14px; margin-bottom:12px; }
    .settings-sec-title { font-size:13px; font-weight:900; color:var(--gold-light); margin-bottom:10px; }
    .setting-row { display:flex; align-items:center; justify-content:space-between; gap:12px; margin:10px 0; }
    .setting-row .sr-label { font-size:13px; font-weight:700; color:#fff; }
    .setting-row .sr-val { font-size:12px; font-weight:800; color:var(--gold-light); min-width:42px; text-align:right; }
    .set-range { -webkit-appearance:none; appearance:none; width:100%; flex:1; height:6px; border-radius:999px;
      background:linear-gradient(90deg,#F0C040 0%,#F0C040 var(--fill,100%),rgba(255,255,255,.18) var(--fill,100%)); margin:4px 0 2px; }
    .set-range::-webkit-slider-thumb { -webkit-appearance:none; width:20px; height:20px; border-radius:50%;
      background:#fff; border:3px solid #F0C040; box-shadow:0 1px 4px rgba(0,0,0,.5); cursor:pointer; }
    .set-range::-moz-range-thumb { width:20px; height:20px; border-radius:50%; background:#fff; border:3px solid #F0C040; cursor:pointer; }
    .set-seg { display:flex; gap:6px; }
    .set-seg button { flex:1; padding:8px 6px; border-radius:10px; font-size:11px; font-weight:800;
      background:rgba(255,255,255,.06); border:1.5px solid rgba(240,192,64,.4); color:#fff; cursor:pointer; }
    .set-seg button.on { background:linear-gradient(180deg,rgba(240,192,64,.3),rgba(0,0,0,.4)); border-color:#F0C040; box-shadow:0 0 8px rgba(240,192,64,.5); }
    .setting-note { font-size:10px; color:#9ca3af; margin-top:-2px; }

    /* shop */
    .shop-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
    .shop-pack { position:relative; background:rgba(17,24,39,.75); border:2px solid var(--gold); border-radius:16px; padding:12px 8px; text-align:center; display:flex; flex-direction:column; align-items:center; gap:6px; }
    .pack-tag { position:absolute; top:-8px; right:8px; background:var(--red); color:#fff; font-size:10px; font-weight:800; padding:2px 8px; border-radius:999px; }
    .pack-title { font-weight:900; color:#fff; font-size:14px; }
    .pack-contents { font-size:13px; color:#F0C040; font-weight:800; line-height:1.5; }
    .shop-note { text-align:center; font-size:11px; color:#9ca3af; margin-top:12px; }

    /* ===== Shinobi Mart（総合ショップ）===== */
    .mini-bar .shop-coins { margin-left:auto; font-size:14px; font-weight:900; color:#F0C040; display:inline-flex; align-items:center; gap:4px; }
    .shop-coins .sc-koban { width:18px; height:18px; object-fit:contain; }
    .shop-sec { margin-bottom:16px; }
    .shop-sec-head { display:flex; align-items:baseline; justify-content:space-between; margin:2px 2px 8px; }
    .shop-sec-title { font-size:15px; font-weight:900; color:#fff; }
    .shop-sec-note { font-size:10.5px; color:var(--sakura); font-weight:700; }
    .piece-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .piece-offer { position:relative; display:flex; flex-direction:column; align-items:center; gap:5px; padding:12px 8px 10px;
      border-radius:14px; border:2px solid var(--rk); background:rgba(17,24,39,.8); text-align:center; }
    .piece-offer.bought { opacity:.55; }
    .piece-offer.maxed { opacity:.55; }
    /* .po-face（円形・overflow:hidden）の外＝.piece-offer 直下（flex通常フロー）に置くことで
       円によるクリップを回避する。position:absolute にすると gap 分の余白が潰れて po-name と重なる
       ため、char-pending-badge と同様に通常フローの要素として配置する */
    .po-owned-badge { margin-top:-3px; white-space:nowrap; padding:1px 6px; border-radius:8px;
      font-size:9.5px; font-weight:900; color:#052e16; background:linear-gradient(180deg,#86efac,#22c55e);
      border:1px solid rgba(255,255,255,.55); box-shadow:0 1px 3px rgba(0,0,0,.4); }
    .po-face { position:relative; width:66px; height:66px; border-radius:50%; display:grid; place-items:center; overflow:hidden;
      background:radial-gradient(circle at 50% 35%, rgba(255,255,255,.12), rgba(0,0,0,.4)); border:2px solid var(--rk); }
    .po-img { width:112%; height:112%; object-fit:contain; }
    .po-name { font-size:13px; font-weight:900; color:#fff; }
    .po-amt { font-size:11px; font-weight:800; color:var(--rk); }
    .po-buy { display:inline-flex; align-items:center; justify-content:center; gap:3px; width:100%; padding:7px 4px; border-radius:9px;
      border:none; cursor:pointer; font-size:12.5px; font-weight:900; color:#4a3400; }
    .po-buy.buy { background:linear-gradient(180deg,#F0C040,#D4A017); }
    .po-buy.poor { background:#6b7280; color:#e5e7eb; }
    .po-buy.disabled { background:#374151; color:#9ca3af; cursor:default; }
    .po-koban { width:15px; height:15px; object-fit:contain; }
    .koban-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:10px; }
    .koban-item { display:flex; flex-direction:column; align-items:center; gap:7px; padding:12px 8px;
      border-radius:14px; border:2px solid rgba(240,192,64,.5); background:rgba(17,24,39,.7); }
    .ki-label { font-size:13px; font-weight:900; color:#fff; }
    .koban-item.bought { opacity:.55; }

    /* --- 仲間ガチャ --- */
    .gacha-list { display:flex; flex-direction:column; gap:10px; }
    .gacha-card { flex-direction:row !important; align-items:center; justify-content:space-between; gap:10px; padding:14px 12px; text-align:left; }
    .gacha-card-title { font-size:14.5px; font-weight:900; color:#fff; }
    .gacha-buy { width:auto; min-width:118px; padding:8px 14px; }
    .gacha-rare   { filter: drop-shadow(0 0 10px rgba(56,189,248,.5)); }
    .gacha-super  { filter: drop-shadow(0 0 12px rgba(240,192,64,.6)); }

    /* ============================================================
       IMAGE-BASED UI  (Unity移植用：文字以外のUIをスプライト画像に置換)
       CSSで描いていた枠/ボタン/バー/バッジ等を assets/images の
       スプライトに差し替える。文字・アイコン絵文字はそのまま上に載る。
       ============================================================ */
    /* --- パネル枠（濃紺＋金縁） UI_Panel : 9-slice(border-image)で角を保ち内側に余白を確保 --- */
    .opp-card, .predict-frame, .build-panel, .result-pop, .steal-summary,
    .bonus-reward, .card-set, .shop-pack, .debug-panel, .reveal-card,
    .menu-sheet, .cp-inner,
    .trigger-card, .raid-log, .bonus-status, .season-tier, .invite-mile,
    .part-card, .build-card, .steal-card, .bonus-tile, .menu-item, .raid-hpbar-frame {
      background: transparent !important;
      border-style: solid !important;
      border-color: transparent !important;
      border-image: url("assets/images/ui/UI_Panel.png") 100 fill / 22px / 0 stretch !important;
      border-width: 22px !important;
      box-shadow: none !important;
      -webkit-backdrop-filter: none !important; backdrop-filter: none !important;
    }
    /* 小さめタイル/行は枠を細く（内側の余白を取りすぎない） */
    .trigger-card, .raid-log, .bonus-status, .season-tier, .invite-mile,
    .part-card, .build-card, .steal-card, .bonus-tile, .menu-item, .raid-hpbar-frame {
      border-image-width: 12px !important;
      border-width: 12px !important;
    }
    /* 選択・所持などの状態は縁取りの代わりに金色グローで表現（枠画像を保ったまま） */
    .steal-card.sel, .steal-card.revealed, .part-card.sel, .build-card.pressed,
    .bonus-tile.hit, .menu-item:active, .season-tier.on, .invite-mile.reached {
      filter: drop-shadow(0 0 10px rgba(240,192,64,.85)) !important;
    }
    .build-card.poor { filter: grayscale(.3) brightness(.8); }

    /* --- カプセル型（ピル） UI_Pill --- */
    .toast, .ghost-label, .ghost-btn,
    .steal-progress, .z-next, .pack-tag {
      background: url("assets/images/ui/UI_Pill.png") center/100% 100% no-repeat !important;
      border: none !important;
      box-shadow: none !important;
      -webkit-backdrop-filter: none !important; backdrop-filter: none !important;
    }
    /* テキスト系ピルは丸い端に文字が乗らないよう左右に余白 */
    .toast, .ghost-label, .ghost-btn, .steal-progress, .z-next, .pack-tag {
      padding-left: 20px !important; padding-right: 20px !important;
    }
    /* --- coin-pill / shield-box: 木札カプセル（Pill_Wood） --- */
    .coin-pill, .shield-box {
      background: url("assets/images/ui/Pill_Wood.png") center/100% 100% no-repeat !important;
      border: none !important;
      box-shadow: none !important;
      -webkit-backdrop-filter: none !important; backdrop-filter: none !important;
      min-height: 38px !important;
      padding-left: 12px !important; padding-right: 14px !important;
    }

    /* --- 大ボタン（木札／絵馬風・金/緑/朱） --- */
    /* 絵馬は上部が尖った形状のため、ラベルは中央よりやや下のインセット面に載せる */
    .big-btn { border: none !important; box-shadow: none !important;
      background: center/100% 100% no-repeat !important;
      white-space: nowrap;
      align-items: flex-end !important; padding-bottom: 12% !important;
      filter: drop-shadow(0 4px 5px rgba(0,0,0,.45)); }
    /* スティール結果の受け取りボタンは枠内に収める */
    .steal-summary .big-btn { font-size: 17px; margin: 10px auto 2px; max-width: 100%; }
    /* big-btn系は押下時もPress画像へ差し替えず、通常のwide画像＋CSSのみで押下感を表現（アスペクト比バグ回避） */
    .big-btn:active:not(:disabled) { transform: translateY(4px) scale(.98); filter: brightness(.9) drop-shadow(0 1px 2px rgba(0,0,0,.45)); }
    .gold-btn  { background-image: url("assets/images/ui/Btn_WoodWide_Gold.png")  !important; color:#3a2a00; text-shadow:0 1px 0 rgba(255,240,200,.5); }
    .green-btn { background-image: url("assets/images/ui/Btn_WoodWide_Green.png") !important; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.6); }
    .red-btn   { background-image: url("assets/images/ui/Btn_WoodWide_Red.png")   !important; color:#fff; text-shadow:0 1px 3px rgba(0,0,0,.7); }
    .big-btn:disabled, .big-btn.disabled { filter: grayscale(.6) brightness(.7); }

    /* --- ロールボタン（丸／手裏剣）＋停止 --- */
    .roll-btn {
      background: url("assets/images/ui/Btn_Roll.png") center/100% 100% no-repeat !important;
      border: none !important;
      box-shadow: none !important;
      filter: drop-shadow(0 6px 8px rgba(0,0,0,.5));
    }
    .roll-btn:active:not(:disabled) { transform: translateY(5px); box-shadow: none !important;
      filter: drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
    .roll-btn.stop { background-image: url("assets/images/ui/Btn_Roll_Stop.png") !important; }
    .roll-btn:disabled { filter: grayscale(.55) brightness(.7); }

    /* --- ボトムドックのナビボタン --- */
    .nav-btn {
      background: url("assets/images/ui/Btn_Nav.png") center/100% 100% no-repeat !important;
      border: none !important;
      box-shadow: none !important;
    }
    .nav-btn:active { background: url("assets/images/ui/Btn_Nav.png") center/100% 100% no-repeat !important;
      filter: drop-shadow(0 0 8px rgba(240,192,64,.7)); }

    /* --- その他ボタン（無料ロール／シーズン受取） --- */
    .free-roll-btn, .tier-btn.ready {
      background: url("assets/images/ui/Btn_Green.png") center/100% 100% no-repeat !important;
      border: none !important; box-shadow: none !important; }
    .tier-btn { background: url("assets/images/ui/Btn_Bet_Off.png") center/100% 100% no-repeat !important;
      border: none !important; }

    /* --- バー（エナジー＝金 / レイドHP＝赤） --- */
    .energy-track, .raid-hpbar {
      background: url("assets/images/ui/Bar_Track.png") center/100% 100% no-repeat !important;
      border: none !important; overflow: visible !important; }
    .energy-fill {
      background: url("assets/images/ui/Bar_Fill_Gold.png") left center/auto 100% no-repeat !important;
      background-size: 100% 100% !important; box-shadow: none !important; }
    .raid-hpfill {
      background: url("assets/images/ui/Bar_Fill_Red.png") left center/100% 100% no-repeat !important; }

    /* --- 通知バッジ（丸） UI_Badge --- */
    .nb-badge, .steal-check, .vi-check {
      background: url("assets/images/ui/UI_Badge.png") center/100% 100% no-repeat !important;
      border: none !important; box-shadow: none !important; color: #fff !important; }

    /* --- トップバーのアイコンボタン（枠を消して画像アイコンを主役に） --- */
    .menu-btn, .plus-btn { background: none !important; border: none !important; box-shadow: none !important; }
    .icon-img { width: 100%; height: 100%; object-fit: contain; display: block; }
    .snd-ico { font-size: 18px; line-height: 1; }

    /* --- 画像アイコン（ナビ/メニュー/ステータス/仲間） --- */
    .nb-ico-img { width: 28px; height: 28px; object-fit: contain; display: block; }
    .nb-badge-ico { width: 13px; height: 13px; object-fit: contain; vertical-align: -2px; margin-right: 1px; }
    .sh-ico-img { width: 21px; height: 21px; object-fit: contain; display: block; }
    .mi-icon-img { width: 32px; height: 32px; object-fit: contain; display: block; margin: 0 auto; }

    /* --- 報酬チップ（シーズン/招待）: 絵文字→画像アイコン --- */
    .reward-chip { display: inline-flex; align-items: center; gap: 5px; }
    .reward-ico { width: 20px; height: 20px; object-fit: contain; display: inline-block; vertical-align: middle; }
    /* --- 村建設カードの建物アイコン（絵文字→建物サムネイル）＋コスト小判 --- */
    .pc-icon-img { width: 42px; height: 42px; object-fit: contain; display: block; margin: 0 auto 2px; filter: drop-shadow(0 2px 3px rgba(0,0,0,.5)); }
    .pc-coin-ico { width: 14px; height: 14px; object-fit: contain; vertical-align: -2px; margin-right: 2px; }

    /* --- ボタン押下状態（*_Press スプライトに差し替え） --- */
    .roll-btn:active:not(:disabled)  { background-image: url("assets/images/ui/Btn_Roll_Press.png") !important; }
    .roll-btn.stop:active:not(:disabled) { background-image: url("assets/images/ui/Btn_Roll_Stop.png") !important; filter: brightness(.8) drop-shadow(0 2px 4px rgba(0,0,0,.5)); }
    /* free-roll-btn / tier-btn.ready は引き続きPress画像スワップを使用（big-btnとは別クラスのため独立） */
    .free-roll-btn:active, .tier-btn.ready:active { background-image: url("assets/images/ui/Btn_Green_Press.png") !important; }
    .nav-btn:active { background-image: url("assets/images/ui/Btn_Nav_Press.png") !important; }
    /* big-btn（木札／絵馬風）はPress画像を持たない方針。通常のwide画像を維持し、
       上部の .big-btn:active ルール（transform: translateY(4px) scale(.98) + brightness(.9)）のみで押下感を出す。
       ここでの画像スワップは行わない。 */
  </style>
</head>
